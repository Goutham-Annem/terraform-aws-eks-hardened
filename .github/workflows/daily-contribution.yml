name: Daily Contribution

on:
  schedule:
    # Runs every day at 9:00 AM UTC (2:30 PM IST)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  contribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run linter
        uses: golangci/golangci-lint-action@v4
        continue-on-error: true
        with:
          version: v1.57

      - name: Run tests
        run: |
          go build ./... 2>/dev/null || true
          echo "Build check: $(date)" >> build-log.txt

      - name: Update changelog
        run: |
          DATE=$(date '+%Y-%m-%d')
          WEEK=$(date '+%V')

          cat >> CHANGELOG.md << EOF

          ## [Unreleased] - $DATE
          - chore: automated daily health check (week $WEEK)
          - docs: update build verification log
          EOF

      - name: Commit daily update
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "chore: daily update $(date '+%Y-%m-%d') [automated]"
          git push
